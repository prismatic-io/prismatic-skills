[tools]
"github-cli" = "2.91.0"
bun = "1.3.13"
node = "24"
"npm:semver" = "7.6.3"

[tasks.typecheck]
description = "Type-check scripts/"
run = "bun run typecheck"

[tasks."format:check"]
description = "Check source file formatting"
run = "bun run check-format"

[tasks.lint]
description = "Lint the source code"
run = "bun run lint"

[tasks.validate]
description = "Run all validation checks"
depends = ["format:check", "lint", "typecheck"]

[tasks.version-bump]
description = "Bump plugin.json version and pin marketplace.json:source.ref to the new tag (set BUMP_TYPE=patch|minor|major)"
run = '''
if [ -z "$BUMP_TYPE" ]; then
  echo "ERROR: BUMP_TYPE is required (patch|minor|major)"
  exit 1
fi
CURRENT=$(node -p "require('./plugin/.claude-plugin/plugin.json').version")
NEXT=$(semver -i "$BUMP_TYPE" "$CURRENT")
VERSION=$NEXT node -e "
  const fs = require('node:fs');
  const v = process.env.VERSION;

  const pluginPath = 'plugin/.claude-plugin/plugin.json';
  const plugin = JSON.parse(fs.readFileSync(pluginPath, 'utf8'));
  plugin.version = v;
  fs.writeFileSync(pluginPath, JSON.stringify(plugin, null, 2) + '\\n');

  const marketPath = '.claude-plugin/marketplace.json';
  const market = JSON.parse(fs.readFileSync(marketPath, 'utf8'));
  market.plugins.find((p) => p.name === 'prismatic-skills').source.ref = 'v' + v;
  fs.writeFileSync(marketPath, JSON.stringify(market, null, 2) + '\\n');
"
echo "v$NEXT"
'''

[tasks.release]
description = "Trigger a release (usage: mise run release -- patch|minor|major)"
run = '''
BUMP="{{arg(i=0, name='bump', required=true)}}"
if [ "$BUMP" != "patch" ] && [ "$BUMP" != "minor" ] && [ "$BUMP" != "major" ]; then
  echo "ERROR: Invalid bump type '$BUMP'. Must be patch, minor, or major."
  exit 1
fi
gh workflow run release.yml -f bump="$BUMP"
echo "Release workflow triggered with bump=$BUMP"
'''
