# Source system — component, connection, credentials, API docs

source_system:
  question: "What is the SOURCE system name?"
  type: text
  inference: allowed
  scope: integration
  agent_context: >
    This identifies where data comes from. For webhook triggers, the source system sends
    data TO Prismatic via HTTP. A source component is only needed when Prismatic must call
    the source system's API (e.g., auto-registering webhooks, fetching additional data,
    polling). If the user only described receiving webhooks with no API callbacks, a source
    component is NOT needed. Name the specific product (e.g., "Salesforce", "Shopify"),
    not a generic category.

source_component:
  question: "Search for existing Prismatic components for the source system."
  type: lookup
  inference: prohibited
  scope: integration
  skippable: true
  lookup:
    script: scripts/integrations/find-components.ts
    args: ["${source_system}"]
  depends_on: [source_system]
  note: >
    Even for webhook triggers, components may provide webhookLifecycleHandlers
    (auto-register/deregister webhooks on deploy/delete) or specialized trigger
    functions (e.g., hashHmacWebhookTrigger for signature verification).
  agent_context: >
    For webhook triggers: SKIP this if the integration only receives webhooks from the
    source (no API callbacks needed). SEARCH if the integration needs to make API calls
    TO the source system (e.g., auto-registering webhooks on deploy, fetching supplementary
    data, managed webhook lifecycle). If unsure, ask the user: "Do you need to make API
    calls back to [source system], or will it just send webhooks?" Components provide typed
    actions, connection helpers (OAuth, API key), data sources, and webhook lifecycle handlers.
  docs:
    - https://prismatic.io/docs/integrations/code-native/existing-components.md

source_connection_type:
  question: "Which connection/auth type for the source component?"
  type: lookup
  inference: prohibited
  scope: integration
  skippable: true
  skip_if_empty: true
  lookup:
    note: "Extract connection types from the source_component search results. Present each connection option (e.g., OAuth2, API Key, Basic Auth) to the user."
    source: source_component.connections
  depends_on: [source_component]
  condition:
    source_component: { not_empty: true }
  note: >
    Store the FULL connection object from the lookup result, not just the key string.
    The key is needed for manifest helper imports during code generation.
  agent_context: |
    <lookup-contract>
      This question is ONLY about which auth method (OAuth 2.0, API Key, Token-Based Auth, etc.).
      The NEXT question asks who manages the connection (org, customer, manifest). Do not combine them.
      Extract connection options from the source_component answer's `connections` array.
      Present each one to the user with its label and auth_type.
      Write the FULL connection JSON object from the array — not a string label, not a slug.
      Example: '{"key":"oauth2-dynamic-inputs","label":"OAuth 2.0","auth_type":"OAuth2","required_inputs":[...]}'
    </lookup-contract>

source_connection:
  question: "How should the source connection be managed?"
  type: choice
  inference: prohibited
  scope: integration
  choices:
    - org_activated
    - customer_activated
    - manifest_based
    - no_connection
  depends_on: [source_connection_type]
  condition:
    source_connection_type: { not_empty: true }
  note: >
    Each choice produces different code:
    - Organization-activated → organizationActivatedConnection() in scopedConfigVars
    - Customer-activated → customerActivatedConnection() in configPages
    - Create new → manifest connection helper (e.g., slackOauth2()) on configPage
    - No connection → no connection config needed
    WARNING: Build-only/demo connections cannot be used with organizationActivatedConnection().
    If only build-only connections exist for org-activated, switch to manifest-based.
  agent_context: |
    <present-as>
      <option value="org_activated">Org-managed — your team configures one shared connection in Prismatic admin. All customer instances use it. Best when you control the account (e.g., your own internal service).</option>
      <option value="customer_activated">Customer-managed — each customer authorizes their own account during instance setup. Standard for multi-tenant SaaS.</option>
      <option value="manifest_based">Config page connection — created fresh on the config page using the component's built-in auth helper. Customer completes OAuth or enters credentials during setup. Most flexible.</option>
      <option value="no_connection">No auth needed — for public APIs or when auth is handled differently.</option>
    </present-as>
    Present all four options. If one doesn't apply, mention it briefly and explain why.
    <connection-search-rules>
      After writing the answer, on_answer triggers a connection search. If results show only org-activated demo/build-only connections AND user chose customer_activated, do NOT offer the demo connection — it's architecturally incompatible. OAuth auth-code connections cannot be org-managed — each customer authorizes individually.
    </connection-search-rules>
  implications:
    "org_activated": >
      One connection shared across all instances. Managed in Prismatic admin, not by customers.
      Uses organizationActivatedConnection() in scopedConfigVars. Cannot use build-only/demo
      connections — they fail at deploy.
    "customer_activated": >
      Each customer authorizes their own account during setup. Uses customerActivatedConnection()
      in configPages. Good for multi-tenant scenarios where each customer has their own credentials.
    "manifest_based": >
      Creates a connection using the component's manifest helper (e.g., slackOauth2()) on the
      config page. Customer completes OAuth or enters API keys during setup. Most common and
      most flexible option.
    "no_connection": >
      No authentication required. Suitable for public endpoints or when auth is handled
      differently (e.g., API key passed as a config variable).
  on_answer:
    org_activated: >
      IMMEDIATELY run `search-connections.ts ${source_system}` to find existing org connections.
      Present results to the user and let them select one. Do not proceed to the next question
      until a connection is selected. Build-only/demo connections cannot be used with
      organizationActivatedConnection() — warn if only those exist.
    customer_activated: >
      IMMEDIATELY run `search-connections.ts ${source_system}` to find existing connections.
      Present results to the user and let them select one.
    manifest_based: >
      The next question will ask about providing credentials. Prepare to run
      `get-credential-prompts.ts` if the user chooses to provide them now.
  docs:
    - https://prismatic.io/docs/integrations/connections.md
  cookbook_section: "Connection Strategy Code Paths"

source_connection_existing:
  question: "Select an existing connection for the source system."
  type: lookup
  inference: prohibited
  scope: integration
  lookup:
    script: scripts/integrations/search-connections.ts
    args: ["${source_system}"]
  depends_on: [source_connection]
  condition:
    source_connection: { in: ["org_activated", "customer_activated"] }
  note: >
    WARNING: Build-only or demo connections (description contains "build only" or "demo")
    CANNOT be used with organizationActivatedConnection(). They will fail at deploy with
    "cannot reference build-only connection container". If only build-only connections
    exist, tell the user and switch to "Create new connection in integration" instead.

source_provide_credentials:
  question: "Provide OAuth/API credentials for the source system now? If yes, they'll be written to .env for immediate use after deploy."
  type: choice
  inference: prohibited
  scope: integration
  choices:
    - "yes"
    - "skip"
  depends_on: [source_connection]
  condition:
    source_connection: "manifest_based"
  agent_context: >
    If you have the OAuth Client ID, Client Secret, and any other required credentials on hand,
    providing them now means the integration will work immediately after deploy. The credentials
    are written to a .env file that the scaffold reads at build time. If you skip this step,
    you'll need to manually edit .env before the connection will authenticate.

source_api_docs_url:
  question: "API documentation URL for the source system (e.g., https://developers.example.com/api)"
  type: text
  inference: allowed
  scope: integration
  validate: "^https?://"
  depends_on: [source_component]
  condition:
    source_component: { empty: true }
  agent_context: >
    When no Prismatic component exists for the source system, we need API documentation
    to generate direct HTTP calls. The agent will fetch this URL to discover endpoints,
    authentication methods, and payload shapes for code generation.
